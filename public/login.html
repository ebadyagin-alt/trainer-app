<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Тренер</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">💪</div>
      <h1>Вход в систему</h1>
      <p class="login-sub">Панель управления тренера</p>

      <form id="form-login">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="trainer@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn-login" id="btn-submit">Войти</button>
      </form>
    </div>
  </div>
  <script>
    if (localStorage.getItem('trainer_jwt')) window.location.href = '/';

    document.getElementById('form-login').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const errEl = document.getElementById('login-error');
      btn.textContent = 'Вход...';
      btn.disabled = true;
      errEl.textContent = '';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || 'Ошибка входа'; btn.textContent = 'Войти'; btn.disabled = false; return; }
        localStorage.setItem('trainer_jwt', data.token);
        localStorage.setItem('trainer_info', JSON.stringify(data.trainer));
        window.location.href = '/';
      } catch {
        errEl.textContent = 'Ошибка соединения';
        btn.textContent = 'Войти';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
