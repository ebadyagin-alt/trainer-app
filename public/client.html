<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Мой кабинет</title>
  <link rel="stylesheet" href="/client.css">
  <link rel="manifest" href="/manifest-client.json">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Кабинет">
  <link rel="apple-touch-icon" href="/icon-client-512.svg">
  <meta name="theme-color" content="#7c6fff">
</head>
<body>

  <div id="app-loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Загрузка кабинета...</p>
  </div>

  <div id="app-error" class="error-screen">
    <div class="error-icon">🔗</div>
    <h2>Ссылка недействительна</h2>
    <p>Обратитесь к тренеру для получения новой персональной ссылки.</p>
  </div>

  <div id="app" style="display:none">

    <header class="header">
      <div class="header-inner">
        <div class="header-brand">
          <div class="header-icon">💪</div>
          <div>
            <div class="header-title">Мой кабинет</div>
            <div class="header-subtitle">Личный портал клиента</div>
          </div>
        </div>
        <div class="header-name-pill" id="header-name"></div>
      </div>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="schedule">📅 Расписание</button>
      <button class="tab-btn" data-tab="sessions">🏋️ Тренировки</button>
      <button class="tab-btn" data-tab="payments">💰 Платежи</button>
    </nav>

    <main class="main">

      <section id="tab-schedule" class="tab active">
        <div class="section-header">
          <h2 style="font-size:20px;font-weight:700">Мои записи</h2>
          <button class="btn btn-primary" id="btn-book">+ Записаться</button>
        </div>
        <div id="schedule-list"></div>
      </section>

      <section id="tab-sessions" class="tab">
        <h2 class="section-title">История тренировок</h2>
        <div id="sessions-list"></div>
      </section>

      <section id="tab-payments" class="tab">
        <h2 class="section-title">Мои платежи</h2>
        <div id="payments-summary" class="payments-summary"></div>
        <div id="payments-list"></div>
      </section>

    </main>
  </div>

  <!-- МОДАЛКА ЗАПИСИ -->
  <div class="modal-overlay" id="modal-book">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2>Записаться к тренеру</h2>
        <button class="modal-close" id="btn-close-book">&times;</button>
      </div>
      <form id="form-book">
        <div class="form-group">
          <label>Дата</label>
          <input type="date" id="book-date" required>
        </div>
        <div class="form-group">
          <label>Время</label>
          <input type="time" id="book-time" required>
        </div>
        <div class="form-group">
          <label>Длительность</label>
          <select id="book-duration">
            <option value="30">30 минут</option>
            <option value="45">45 минут</option>
            <option value="60" selected>60 минут</option>
            <option value="90">90 минут</option>
          </select>
        </div>
        <div class="form-group">
          <label>Пожелания</label>
          <textarea id="book-notes" rows="3" placeholder="Что хотите проработать на тренировке?"></textarea>
        </div>
        <div class="hint">⏳ Тренер подтвердит запись в ближайшее время</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="btn-cancel-book">Отмена</button>
          <button type="submit" class="btn btn-primary">Отправить запрос</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/client.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
